<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI 김반장 | 민원·고충 서류 생성기 - 공구리닷컴</title>
  <meta name="description" content="공구리닷컴 AI 김반장 - 음성 또는 텍스트로 민원·고충 서류를 자동 생성해 드립니다." />
  <meta name="theme-color" content="#111111" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #111111;
      --bg2: #1a1a1a;
      --bg3: #222222;
      --yellow: #FFD600;
      --yellow-dark: #E6C000;
      --yellow-glow: rgba(255, 214, 0, 0.25);
      --yellow-glow2: rgba(255, 214, 0, 0.08);
      --red: #FF4444;
      --green: #00CC66;
      --text: #FFFFFF;
      --text-dim: #AAAAAA;
      --border: rgba(255, 214, 0, 0.3);
      --radius: 18px;
      --font: 'Noto Sans KR', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 60px 0;
    }

    /* HEADER */
    header {
      width: 100%;
      max-width: 600px;
      padding: 32px 20px 16px;
      text-align: center;
    }

    .logo-badge {
      display: inline-block;
      background: var(--yellow);
      color: #111;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1.5px;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 38px;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1.15;
      text-shadow: 0 0 30px var(--yellow-glow), 0 2px 4px rgba(0,0,0,0.5);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 17px;
      color: var(--text-dim);
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0;
    }

    /* MAIN CONTAINER */
    .main {
      width: 100%;
      max-width: 600px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* CARD */
    .card {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 18px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--yellow);
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* BIG BUTTONS */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .big-btn {
      width: 100%;
      min-height: 80px;
      border: none;
      border-radius: 16px;
      font-family: var(--font);
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 20px;
      position: relative;
      overflow: hidden;
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.3px;
      
      /* 모바일 길게 누르기(Long press), 드래그 방지 */
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .big-btn:active {
      transform: scale(0.97);
    }

    /* Voice Button */
    .btn-voice {
      background: linear-gradient(135deg, #FFD600 0%, #FFA000 100%);
      color: #111;
      box-shadow: 0 4px 24px rgba(255,214,0,0.35), 0 2px 8px rgba(0,0,0,0.3);
    }

    .btn-voice:hover {
      box-shadow: 0 6px 32px rgba(255,214,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
      transform: translateY(-2px);
    }

    .btn-voice.recording {
      background: linear-gradient(135deg, #FF4444 0%, #CC0000 100%);
      color: #fff;
      box-shadow: 0 4px 24px rgba(255,68,68,0.5), 0 2px 8px rgba(0,0,0,0.3);
      animation: pulse-btn 1.2s ease-in-out infinite;
    }

    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 4px 24px rgba(255,68,68,0.5), 0 0 0 0 rgba(255,68,68,0.4); }
      50% { box-shadow: 0 6px 32px rgba(255,68,68,0.7), 0 0 0 12px rgba(255,68,68,0); }
    }

    /* Text Button */
    .btn-text {
      background: var(--bg3);
      color: var(--yellow);
      border: 2px solid var(--yellow);
      box-shadow: 0 2px 12px rgba(255,214,0,0.1);
    }

    .btn-text:hover {
      background: var(--yellow-glow2);
      box-shadow: 0 4px 20px rgba(255,214,0,0.2);
      transform: translateY(-1px);
    }

    /* Copy Button */
    .btn-copy-main {
      background: var(--bg3);
      color: #AAAAAA;
      border: 2px solid #444;
      box-shadow: none;
      font-size: 22px;
    }

    .btn-copy-main.has-result {
      color: #fff;
      border-color: #666;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .btn-copy-main.has-result:hover {
      border-color: var(--yellow);
      color: var(--yellow);
      transform: translateY(-1px);
    }

    .btn-copy-main.copied {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0, 204, 102, 0.08);
    }

    .btn-icon {
      font-size: 32px;
      flex-shrink: 0;
    }

    /* TEXT INPUT PANEL */
    .input-panel {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .input-panel.visible {
      display: flex;
    }

    .input-label {
      font-size: 18px;
      font-weight: 700;
      color: var(--yellow);
    }

    textarea#userText {
      width: 100%;
      min-height: 160px;
      background: var(--bg3);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: #fff;
      font-family: var(--font);
      font-size: 22px;
      font-weight: 400;
      line-height: 1.6;
      padding: 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea#userText:focus {
      border-color: var(--yellow);
    }

    textarea#userText::placeholder {
      color: #555;
      font-size: 18px;
    }

    .submit-btn {
      width: 100%;
      min-height: 70px;
      border: none;
      border-radius: 14px;
      font-family: var(--font);
      font-size: 24px;
      font-weight: 700;
      color: #111;
      background: linear-gradient(135deg, #FFD600 0%, #FFA000 100%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(255,214,0,0.3);
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(255,214,0,0.45);
    }

    .submit-btn:active {
      transform: scale(0.97);
    }

    /* VOICE STATUS */
    .voice-status {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg3);
      border-radius: 12px;
      border: 1.5px solid rgba(255,68,68,0.3);
    }

    .voice-status.visible {
      display: flex;
    }

    .mic-wave {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .mic-wave span {
      display: block;
      width: 4px;
      background: var(--red);
      border-radius: 2px;
      animation: wave 0.9s ease-in-out infinite;
    }

    .mic-wave span:nth-child(1) { height: 10px; animation-delay: 0s; }
    .mic-wave span:nth-child(2) { height: 20px; animation-delay: 0.1s; }
    .mic-wave span:nth-child(3) { height: 28px; animation-delay: 0.2s; }
    .mic-wave span:nth-child(4) { height: 20px; animation-delay: 0.1s; }
    .mic-wave span:nth-child(5) { height: 10px; animation-delay: 0s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }

    .voice-status-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--red);
    }

    /* TRANSCRIPT */
    .transcript-box {
      display: none;
      padding: 14px 16px;
      background: var(--bg3);
      border-radius: 12px;
      border: 1.5px solid var(--border);
    }

    .transcript-box.visible {
      display: block;
    }

    .transcript-label {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .transcript-text {
      font-size: 20px;
      color: #fff;
      line-height: 1.6;
      font-weight: 400;
      word-break: break-all;
    }

    /* LOADING */
    .loading-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px 20px;
    }

    .loading-overlay.visible {
      display: flex;
    }

    .spinner {
      width: 56px;
      height: 56px;
      border: 5px solid rgba(255,214,0,0.15);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 26px;
      font-weight: 700;
      color: var(--yellow);
      text-align: center;
      text-shadow: 0 0 20px var(--yellow-glow);
      animation: flicker 1.6s ease-in-out infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }

    /* RESULT */
    .result-section {
      display: none;
    }

    .result-section.visible {
      display: block;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 10px;
    }

    .result-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--yellow);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-badge {
      background: var(--green);
      color: #000;
      font-size: 11px;
      font-weight: 900;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: 0.5px;
      animation: pop-in 0.3s ease;
    }

    @keyframes pop-in {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .result-copy-btn {
      flex-shrink: 0;
      border: 2px solid var(--yellow);
      background: transparent;
      color: var(--yellow);
      font-family: var(--font);
      font-size: 18px;
      font-weight: 700;
      border-radius: 10px;
      padding: 9px 18px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .result-copy-btn:hover {
      background: var(--yellow);
      color: #111;
    }

    .result-copy-btn:active {
      transform: scale(0.96);
    }

    .result-copy-btn.copied {
      border-color: var(--green);
      color: var(--green);
      background: rgba(0, 204, 102, 0.1);
    }

    textarea#resultText {
      width: 100%;
      min-height: 280px;
      background: #0d0d0d;
      border: 2px solid rgba(255,214,0,0.2);
      border-radius: 14px;
      color: #fff;
      font-family: var(--font);
      font-size: 22px;
      font-weight: 400;
      line-height: 1.75;
      padding: 20px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea#resultText:focus {
      border-color: rgba(255,214,0,0.5);
    }

    /* ERROR BOX (음성/입력 인라인 오류) */
    .error-box {
      display: none;
      background: rgba(255,68,68,0.1);
      border: 1.5px solid rgba(255,68,68,0.5);
      border-radius: 12px;
      padding: 16px;
      color: #FF8888;
      font-size: 20px;
      font-weight: 400;
      line-height: 1.5;
      white-space: pre-line;
    }

    .error-box.visible {
      display: block;
    }

    /* FETCH FAILURE PANEL */
    .fail-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 28px 18px;
      background: var(--bg2);
      border: 1.5px solid rgba(255,68,68,0.4);
      border-radius: var(--radius);
    }

    .fail-panel.visible {
      display: flex;
    }

    .fail-icon {
      font-size: 48px;
      line-height: 1;
    }

    .fail-msg {
      font-size: 24px;
      font-weight: 700;
      color: var(--yellow);
      text-align: center;
      line-height: 1.5;
    }

    .fail-sub {
      font-size: 18px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.5;
    }

    .fail-btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .fail-retry-btn {
      width: 100%;
      min-height: 72px;
      border: 2.5px solid var(--yellow);
      background: transparent;
      color: var(--yellow);
      font-family: var(--font);
      font-size: 24px;
      font-weight: 700;
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .fail-retry-btn:hover {
      background: var(--yellow-glow2);
      box-shadow: 0 4px 20px rgba(255,214,0,0.2);
      transform: translateY(-1px);
    }

    .fail-retry-btn:active {
      transform: scale(0.97);
    }

    .fail-reset-btn {
      width: 100%;
      min-height: 60px;
      border: 2px solid #444;
      background: transparent;
      color: #888;
      font-family: var(--font);
      font-size: 20px;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .fail-reset-btn:hover {
      border-color: #666;
      color: #aaa;
    }

    .fail-reset-btn:active {
      transform: scale(0.97);
    }

    /* RESET BTN */
    .reset-btn {
      width: 100%;
      min-height: 60px;
      border: 2px solid #333;
      background: transparent;
      color: #666;
      font-family: var(--font);
      font-size: 20px;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:hover {
      border-color: #555;
      color: #999;
    }

    .reset-btn:active {
      transform: scale(0.97);
    }

    /* FOOTER */
    footer {
      width: 100%;
      max-width: 600px;
      padding: 20px 20px 10px;
      text-align: center;
    }

    .footer-text {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
    }

    .footer-brand {
      color: var(--yellow);
      font-weight: 700;
    }

    @media (min-width: 480px) {
      h1 { font-size: 44px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-badge">⚙️ 공구리닷컴</div>
    <h1>AI 김반장</h1>
    <p class="tagline">민원·고충 서류 자동 생성기</p>
    <p class="subtitle">말 한마디로 서류 한 장 뚝딱!</p>
  </header>

  <div class="main">

    <!-- 입력 카드 -->
    <div class="card" id="inputCard">
      <div class="section-title">🗣️ 상황을 설명해 주세요</div>
      <div class="btn-group">
        <!-- 1. 음성 버튼 -->
        <button class="big-btn btn-voice" id="voiceBtn">
          <span class="btn-icon">🎙️</span>
          <span id="voiceBtnLabel">음성으로 말하기</span>
        </button>

        <!-- 2. 텍스트 버튼 -->
        <button class="big-btn btn-text" id="textBtn" onclick="toggleTextInput()">
          <span class="btn-icon">⌨️</span>
          <span>텍스트로 입력</span>
        </button>
      </div>

      <!-- 음성 녹음 상태 -->
      <div class="voice-status" id="voiceStatus" style="margin-top:14px;">
        <div class="mic-wave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <span class="voice-status-text" id="voiceStatusText">🎤 녹음 중... 손 떼면 전송합니다</span>
      </div>

      <!-- 녹음 완료 상태 표시 -->
      <div class="transcript-box" id="transcriptBox" style="margin-top:12px;">
        <div class="transcript-label" id="transcriptLabel">🎤 녹음 완료</div>
        <div class="transcript-text" id="transcriptText"></div>
      </div>

      <!-- 음성 완료 후 전송 버튼 -->
      <button class="submit-btn" id="voiceSubmitBtn" style="display:none; margin-top:14px;" onclick="submitFromVoice()">
        🚀 서류 만들기
      </button>

      <!-- 텍스트 입력 패널 -->
      <div class="input-panel" id="inputPanel" style="margin-top:14px;">
        <label class="input-label" for="userText">📋 민원 내용을 입력하세요</label>
        <textarea id="userText" placeholder="예시) 우리 아파트 윗집에서 매일 밤 11시 이후에 뛰어다니는 소리가 들립니다. 층간소음 민원 서류를 작성해주세요."></textarea>
        <button class="submit-btn" onclick="submitText()">
          🚀 서류 만들기
        </button>
      </div>
    </div>

    <!-- 로딩 -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">서류 타설 중입니더... 🏗️</div>
      <div style="font-size:15px; color:#888; text-align:center; margin-top:-8px;">최대 50초 정도 걸릴 수 있어요</div>
    </div>

    <!-- 인라인 에러 (음성/입력) -->
    <div class="error-box" id="errorBox"></div>

    <!-- 웹훅 실패 패널 -->
    <div class="fail-panel" id="failPanel">
      <div class="fail-icon">⚠️</div>
      <div class="fail-msg" id="failMsg">서류 타설에 실패했습니다.<br>잠시 후 다시 시도해주세요.</div>
      <div class="fail-sub" id="failSub"></div>
      <div class="fail-btn-group">
        <button class="fail-retry-btn" id="failRetryBtn" onclick="retryWebhook()">
          🔁 다시 시도
        </button>
        <button class="fail-reset-btn" onclick="resetAll()">
          🔄 처음부터 다시
        </button>
      </div>
    </div>

    <!-- 결과 -->
    <div class="card result-section" id="resultSection">
      <div class="result-header">
        <div class="result-title">
          📄 완성된 서류
          <span class="result-badge">완료</span>
        </div>
        <button class="result-copy-btn" id="resultCopyBtn" onclick="copyResult()">
          📋 전체 복사
        </button>
      </div>
      <textarea id="resultText" readonly></textarea>
    </div>

    <!-- 3. 결과 복사하기 왕버튼 -->
    <button class="big-btn btn-copy-main" id="copyMainBtn" onclick="copyResult()">
      <span class="btn-icon">📋</span>
      <span id="copyMainLabel">결과 복사하기</span>
    </button>

    <!-- 다시 시작 -->
    <button class="reset-btn" id="resetBtn" style="display:none;" onclick="resetAll()">
      🔄 처음부터 다시 하기
    </button>

  </div>

  <footer>
    <p class="footer-text">
      <span class="footer-brand">공구리닷컴 AI 김반장</span><br>
      앱 설치 없이 브라우저에서 바로 사용<br>
      &copy; 2026 공구리닷컴. All rights reserved.<br>
      <span style="font-size:12px; color:#333;">빌드: 2026-07-18 15:58</span>
    </p>
  <script>
    // ── 상태 변수 ──
    var mediaRecorder   = null;   // MediaRecorder 인스턴스
    var audioChunks     = [];     // 녹음 청크 누적
    var audioStream     = null;   // 마이크 스트림
    var isListening     = false;  // 이중 시작 방지 가드
    var isRecording     = false;
    var recordStartTime = 0;      // 녹음 시작 타임스탬프
    var recTimerID      = null;   // 녹음 시간 표시 타이머
    var lastPayload     = null;   // 재시도용 마지막 페이로드
    var currentResult   = '';
    var textPanelOpen   = false;
    
    // 디버깅용 타이머
    var debugPointerDownTime = 0;

    var WEBHOOK_URL = 'https://hook.eu2.make.com/2nk17hsfq47rcquqsdos24ewlia339nv';
    var TIMEOUT_MS  = 50000;   // 50초 타임아웃

    // ── DOM 레퍼런스 ──
    var voiceBtn        = document.getElementById('voiceBtn');
    var voiceBtnLabel   = document.getElementById('voiceBtnLabel');
    var voiceStatus     = document.getElementById('voiceStatus');
    var voiceStatusText = document.getElementById('voiceStatusText');
    var transcriptBox   = document.getElementById('transcriptBox');
    var transcriptLabel = document.getElementById('transcriptLabel');
    var transcriptText  = document.getElementById('transcriptText');
    var voiceSubmitBtn  = document.getElementById('voiceSubmitBtn');
    var inputPanel      = document.getElementById('inputPanel');
    var loadingOverlay  = document.getElementById('loadingOverlay');
    var errorBox        = document.getElementById('errorBox');
    var failPanel       = document.getElementById('failPanel');
    var failMsg         = document.getElementById('failMsg');
    var failSub         = document.getElementById('failSub');
    var resultSection   = document.getElementById('resultSection');
    var resultText      = document.getElementById('resultText');
    var resultCopyBtn   = document.getElementById('resultCopyBtn');
    var copyMainBtn     = document.getElementById('copyMainBtn');
    var copyMainLabel   = document.getElementById('copyMainLabel');
    var resetBtn        = document.getElementById('resetBtn');

    // ── 버튼 초기 텍스트 ──
    voiceBtnLabel.textContent = '누르고 말하기 (떼면 전송)';

    // ── Pointer Events: pointerdown 시작 / pointerup·pointercancel 종료 ──
    voiceBtn.addEventListener('pointerdown', function(e) {
      debugPointerDownTime = Date.now();
      console.log('[Pointer] pointerdown 발생:', debugPointerDownTime);
      e.preventDefault();
      if (isListening) { return; }             // 이중 시작 차단
      voiceBtn.setPointerCapture(e.pointerId); // 손떨림 안정성
      startRecording();
    });

    voiceBtn.addEventListener('pointerup', function(e) {
      console.log('[Pointer] pointerup 발생! 유지 시간(ms):', Date.now() - debugPointerDownTime);
      e.preventDefault();
      if (voiceBtn.hasPointerCapture(e.pointerId)) {
        voiceBtn.releasePointerCapture(e.pointerId);
      }
      stopRecording();
    });

    voiceBtn.addEventListener('pointercancel', function(e) {
      console.error('[Pointer] pointercancel 발생! 유지 시간(ms):', Date.now() - debugPointerDownTime, '(브라우저가 제스처를 가로챔)');
      stopRecording();
    });

    // ── 녹음 시작 ──
    function startRecording() {
      if (isListening) { return; }
      isListening = true;
      isRecording = true;

      if (textPanelOpen) {
        inputPanel.classList.remove('visible');
        textPanelOpen = false;
      }
      hideResult();
      hideError();
      transcriptBox.classList.remove('visible');
      voiceSubmitBtn.style.display = 'none';

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        isListening = false;
        isRecording = false;
        showError('이 브라우저는 마이크 녹음을 지원하지 않습니다.\n크롬(Chrome) 브라우저를 사용해 주세요.');
        return;
      }

      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(function(stream) {
          // 버튼을 누르자마자 바로 뗀 경우
          if (!isListening) {
            stream.getTracks().forEach(function(t) { t.stop(); });
            return;
          }

          audioStream = stream;
          audioChunks = [];

          // 안드로이드 크롬에서 지원하는 mimeType 선택
          var mimeType = 'audio/webm';
          if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
          else if (MediaRecorder.isTypeSupported('audio/webm')) mimeType = 'audio/webm';
          else if (MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) mimeType = 'audio/ogg;codecs=opus';
          else if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';

          mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });

          mediaRecorder.ondataavailable = function(e) {
            if (e.data && e.data.size > 0) { audioChunks.push(e.data); }
          };

          mediaRecorder.onstop = function() {
            // 스트림 정리
            if (audioStream) {
              audioStream.getTracks().forEach(function(t) { t.stop(); });
              audioStream = null;
            }

            var recSec     = Math.round((Date.now() - recordStartTime) / 1000);
            var actualMime = (mediaRecorder && mediaRecorder.mimeType) ? mediaRecorder.mimeType : mimeType;
            
            // 코덱 정보가 포함된 경우 세미콜론 이전 부분만 추출 (Gemini API 호환성)
            var cleanMimeType = actualMime.split(';')[0]; 

            // UI 정리
            _resetVoiceUI();

            if (audioChunks.length === 0) {
              showError('🔇 녹음된 소리가 없습니다. 다시 눌러서 말씀해 주세요.');
              return;
            }

            // 녹음 완료 상태 표시
            transcriptLabel.textContent = '🎤 녹음 완료';
            transcriptText.textContent  = '⏱️ ' + recSec + '초 녹음 — 서류를 생성하는 중입니다...';
            transcriptBox.classList.add('visible');

            // base64 변환 후 자동 전송
            var blob   = new Blob(audioChunks, { type: cleanMimeType });
            var reader = new FileReader();
            reader.onloadend = function() {
              var dataUrl = reader.result;           // "data:audio/webm;base64,AAAA..."
              var base64  = dataUrl.split(',')[1];   // data: 접두사 제거
              sendAudioToWebhook(base64, cleanMimeType);
            };
            reader.readAsDataURL(blob);
          };

          mediaRecorder.start(100); // 100ms 청크마다 ondataavailable 호출
          recordStartTime = Date.now();

          // 녹음 중 UI
          voiceBtn.classList.add('recording');
          voiceBtnLabel.textContent = '🔴 녹음 중... (떼면 전송)';
          voiceStatus.classList.add('visible');

          // 녹음 시간 카운터
          if (recTimerID) clearInterval(recTimerID);
          recTimerID = setInterval(function() {
            var elapsed = Math.round((Date.now() - recordStartTime) / 1000);
            if(voiceStatusText) voiceStatusText.textContent = '🎤 녹음 중 ' + elapsed + '초... (손 떼면 전송)';
          }, 1000);
        })
        .catch(function(err) {
          isListening = false;
          isRecording = false;
          var msg = '🎤 마이크 접근에 실패했습니다.';
          if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
            msg = '🎤 마이크 권한이 거부되었습니다.\n브라우저 주소창 우측 아이콘에서 마이크를 허용해 주세요.';
          } else if (err.name === 'NotFoundError') {
            msg = '🎤 사용 가능한 마이크를 찾지 못했습니다.';
          }
          showError(msg);
        });
    }

    // ── 녹음 중지 ──
    function stopRecording() {
      if (!isListening) { return; }
      isListening = false; // 즉시 false → 재진입 차단
      isRecording = false;

      if (recTimerID) { clearInterval(recTimerID); recTimerID = null; }
      voiceStatus.classList.remove('visible');
      if (voiceStatusText) voiceStatusText.textContent = '🎤 녹음 중... 손 떼면 전송합니다';

      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        try { mediaRecorder.stop(); } catch(ex) {}
        // onstop에서 후처리
      } else {
        // 마이크 획득 전 뗀 경우: 그냥 UI 정리
        _resetVoiceUI();
        if (audioStream) {
          audioStream.getTracks().forEach(function(t) { t.stop(); });
          audioStream = null;
        }
      }
    }

    // ── 녹음 UI 리셋 ──
    function _resetVoiceUI() {
      voiceBtn.classList.remove('recording');
      voiceBtnLabel.textContent = '누르고 말하기 (떼면 전송)';
      voiceStatus.classList.remove('visible');
    }

    // ── 오디오 전송 ──
    function sendAudioToWebhook(base64, mimeType) {
      lastPayload = { audio: base64, mimeType: mimeType };
      _doWebhookRequest(lastPayload);
    }

    // ── 텍스트 입력 제출 ──
    function submitText() {
      var text = document.getElementById('userText').value.trim();
      if (!text) { showError('✏️ 내용을 입력해 주세요.'); return; }
      hideError();
      inputPanel.classList.remove('visible');
      textPanelOpen = false;
      lastPayload = { text: text };
      _doWebhookRequest(lastPayload);
    }

    // ── 웹훅 요청 공통 로직 ──
    function _doWebhookRequest(payload) {
      loadingOverlay.classList.add('visible');
      hideError();
      hideFailPanel();
      hideResult();

      var controller = new AbortController();
      var timeoutId  = setTimeout(function() { controller.abort(); }, TIMEOUT_MS);

      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        signal: controller.signal
      })
      .then(function(response) {
        clearTimeout(timeoutId);
        if (!response.ok) {
          var err = new Error('HTTP_' + response.status);
          err.type   = 'server';
          err.status = response.status;
          throw err;
        }
        return response.json();
      })
      .then(function(data) {
        if (String(data.success) === 'true') {
          showResult(data.document || '');
        } else {
          var err = new Error(data.message || '서버가 실패 응답을 반환했습니다.');
          err.type = 'server';
          throw err;
        }
      })
      .catch(function(err) {
        clearTimeout(timeoutId);
        var title = '서류 타설에 실패했습니다.<br>잠시 후 다시 시도해주세요.';
        var sub   = '';
        if (err.name === 'AbortError') {
          title = '요청 시간이 초과됐습니다. (50초)<br>다시 시도해주세요.';
          sub   = '서버 응답이 너무 늦거나 네트워크가 느릴 수 있습니다.';
        } else if (err.type === 'server') {
          title = '서버에서 오류가 발생했습니다.<br>잠시 후 다시 시도해주세요.';
          sub   = err.status ? '오류 코드: HTTP ' + err.status : err.message;
        } else {
          title = '네트워크 연결을 확인해주세요.<br>인터넷이 끊겼을 수 있습니다.';
          sub   = '연결 복구 후 다시 시도해주세요.';
        }
        showFailPanel(title, sub);
      })
      .finally(function() {
        loadingOverlay.classList.remove('visible');
      });
    }

    // ── 재시도 ──
    function retryWebhook() {
      if (!lastPayload) { return; }
      hideFailPanel();
      _doWebhookRequest(lastPayload);
    }

    // ── 텍스트 입력 토글 ──
    function toggleTextInput() {
      if (isRecording) stopRecording();
      hideResult();
      textPanelOpen = !textPanelOpen;
      if (textPanelOpen) {
        inputPanel.classList.add('visible');
        setTimeout(function() { document.getElementById('userText').focus(); }, 100);
      } else {
        inputPanel.classList.remove('visible');
      }
    }

    // ── 실패 패널 ──
    function showFailPanel(title, sub) {
      failMsg.innerHTML   = title;
      failSub.textContent = sub || '';
      failPanel.classList.add('visible');
      setTimeout(function() {
        failPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
    function hideFailPanel() { failPanel.classList.remove('visible'); }

    // ── 결과 ──
    function showResult(doc) {
      currentResult = doc;
      resultText.value = doc;
      resultSection.classList.add('visible');
      resetBtn.style.display = 'flex';
      copyMainBtn.classList.add('has-result');
      setTimeout(function() {
        resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 150);
    }
    function hideResult() {
      currentResult = '';
      resultSection.classList.remove('visible');
      if (resultText) resultText.value = '';
      resetBtn.style.display = 'none';
      copyMainBtn.classList.remove('has-result', 'copied');
      copyMainLabel.textContent = '결과 복사하기';
    }

    // ── 복사 ──
    function copyResult() {
      if (!currentResult) {
        showError('📋 복사할 서류가 없습니다. 먼저 서류를 생성해 주세요.');
        return;
      }
      function onSuccess() {
        resultCopyBtn.classList.add('copied');
        resultCopyBtn.textContent = '✅ 복사됨!';
        copyMainBtn.classList.add('copied');
        copyMainLabel.textContent = '✅ 복사 완료!';
        setTimeout(function() {
          resultCopyBtn.classList.remove('copied');
          resultCopyBtn.textContent = '📋 전체 복사';
          copyMainBtn.classList.remove('copied');
          copyMainLabel.textContent = '결과 복사하기';
        }, 2500);
      }
      function onFail() {
        try {
          resultText.select();
          document.execCommand('copy');
          onSuccess();
        } catch(e2) {
          showError('📋 복사에 실패했습니다. 텍스트를 직접 선택해서 복사해 주세요.');
        }
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(currentResult).then(onSuccess).catch(onFail);
      } else {
        onFail();
      }
    }

    // ── 에러 ──
    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('visible');
      errorBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function hideError() { errorBox.classList.remove('visible'); }

    // ── 전체 리셋 ──
    function resetAll() {
      if (isListening) stopRecording();
      isListening   = false;
      isRecording   = false;
      lastPayload   = null;
      currentResult = '';
      textPanelOpen = false;

      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        try { mediaRecorder.stop(); } catch(ex) {}
      }
      mediaRecorder = null;
      audioChunks   = [];
      if (audioStream) {
        audioStream.getTracks().forEach(function(t) { t.stop(); });
        audioStream = null;
      }
      if (recTimerID) { clearInterval(recTimerID); recTimerID = null; }

      _resetVoiceUI();
      transcriptBox.classList.remove('visible');
      if (transcriptLabel) transcriptLabel.textContent = '🎤 녹음 완료';
      transcriptText.textContent   = '';
      voiceSubmitBtn.style.display = 'none';
      inputPanel.classList.remove('visible');
      document.getElementById('userText').value = '';
      hideResult();
      hideError();
      hideFailPanel();
      loadingOverlay.classList.remove('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
